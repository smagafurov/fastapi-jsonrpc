name: docs

on:
  push:
    branches: [master]
    paths:
      - docs/**
      - zensical.toml
      - README.md
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise concurrent deployments; don't cancel in-progress runs so the
# last push always wins but a mid-flight deploy can finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Build site with Zensical
        run: uv run --frozen zensical build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
